<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f8f4ed">
  <meta name="description" content="چت‌بات فارسی برای انتخاب سریع غذا و فیلم">
  <title>چی‌چی | چی انتخاب کنم؟</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <a class="brand" href="#" aria-label="خانه">
        <span class="brand-mark">چ</span>
        <span><strong>چی‌چی</strong><small>دستیار انتخاب</small></span>
      </a>
      <button id="resetButton" class="icon-button" type="button" aria-label="گفت‌وگوی تازه" title="گفت‌وگوی تازه">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11a8 8 0 1 0-2.34 5.66M20 4v7h-7"/></svg>
      </button>
    </header>

    <section id="chat" class="chat" aria-live="polite">
      <div id="welcome" class="welcome">
        <div class="hero-orbit"><span>؟</span></div>
        <p class="eyebrow">کمتر فکر کن، بهتر انتخاب کن</p>
        <h1>امروز چی می‌چسبه؟</h1>
        <p class="intro">حال‌وهوات رو بگو؛ برای غذا یا فیلم، سریع به یک انتخاب خوب می‌رسیم.</p>
        <div class="suggestions" aria-label="پیشنهادهای شروع">
          <button type="button" data-prompt="برای شام یک غذای سریع و کم‌هزینه پیشنهاد بده">🍜 شام سریع و اقتصادی</button>
          <button type="button" data-prompt="امشب با دوستم چه فیلم هیجان‌انگیزی ببینیم؟">🎬 فیلم برای امشب</button>
          <button type="button" data-prompt="بین پیتزا، برگر و غذای ایرانی یکی را تصادفی انتخاب کن">🎲 شانسی انتخاب کن</button>
        </div>
      </div>
      <div id="messages" class="messages"></div>
    </section>

    <footer class="composer-wrap">
      <form id="chatForm" class="composer">
        <textarea id="messageInput" rows="1" maxlength="1200" placeholder="مثلاً یک فیلم آرام برای آخر شب..." aria-label="پیام شما" required></textarea>
        <button id="sendButton" type="submit" aria-label="ارسال پیام">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m5 12 14-7-4 14-3-6-7-1Z"/><path d="m12 13 7-8"/></svg>
        </button>
      </form>
      <p>پیشنهاد هوش مصنوعی ممکن است بی‌نقص نباشد.</p>
    </footer>
  </main>
  <script src="app.js" defer></script>
</body>
</html>
